{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Resume Screening</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'css/app.css' %}" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="/">Resume AI</a>
      <div>
        {% if user.is_authenticated %}
          <span class="text-light small me-2">{{ user.username }} ({{ user.role }})</span>
          <a class="btn btn-sm btn-light" href="{% url 'dashboard' %}">Dashboard</a>
          <a class="btn btn-sm btn-danger" href="{% url 'logout' %}">Logout</a>
        {% else %}
          <a class="btn btn-sm btn-light" href="{% url 'login' %}">Login</a>
          <a class="btn btn-sm btn-primary" href="{% url 'register' %}">Register</a>
        {% endif %}
      </div>
    </div>
  </nav>
  <main class="container py-4">
    {% for message in messages %}
      <div class="alert alert-info">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
