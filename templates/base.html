{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Resume Screening</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'css/app.css' %}?v=20260426-2" rel="stylesheet">
</head>
<body class="app-body">
  <nav class="navbar navbar-expand-lg app-navbar">
    <div class="container-xl">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <span class="brand-mark">RS</span>
        <span>Resume AI</span>
      </a>
      <div class="d-flex align-items-center gap-2 ms-auto">
        <button id="themeToggle" type="button" class="btn btn-sm btn-subtle btn-interactive icon-only-btn" aria-label="Toggle theme">
          <i data-lucide="moon-star"></i>
        </button>
        {% if user.is_authenticated %}
          <span class="user-chip">{{ user.username }} ({{ user.role }})</span>
          <a class="btn btn-sm btn-subtle btn-interactive" href="{% url 'dashboard' %}">
            <i data-lucide="layout-dashboard"></i>
            <span>Dashboard</span>
          </a>
          <a class="btn btn-sm btn-brand btn-interactive" href="{% url 'logout' %}">
            <i data-lucide="log-out"></i>
            <span>Logout</span>
          </a>
        {% else %}
          <a class="btn btn-sm btn-subtle btn-interactive" href="{% url 'login' %}">
            <i data-lucide="log-in"></i>
            <span>Login</span>
          </a>
          <a class="btn btn-sm btn-brand btn-interactive" href="{% url 'register' %}">
            <i data-lucide="user-plus"></i>
            <span>Register</span>
          </a>
        {% endif %}
      </div>
    </div>
  </nav>
  <main class="container-xl py-4 py-lg-5">
    {% for message in messages %}
      <div class="alert alert-info app-alert">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="{% static 'js/app.js' %}?v=20260426-2"></script>
</body>
</html>
