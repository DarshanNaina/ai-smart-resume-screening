{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card">
      <div class="card-body">
        <h4 class="mb-3">Security Verification</h4>
        <p>Enter the secret code to access privileged functionalities.</p>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-primary w-100" type="submit">Verify</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
